name: Publish + Generate SEO + Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ IMPORTANT (so git pull works)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate site files
        run: python generate_seo.py

      - name: Commit generated files (safe push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # ✅ If no changes, stop cleanly
          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi

          git commit -m "Auto-publish + regenerate site files"

          # ✅ Pull latest changes from GitHub BEFORE pushing
          git pull --rebase origin main

          # ✅ Now push safely
          git push origin main


